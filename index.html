<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StartGo - Precision Timer</title>
    <style>
        :root {
            --bg: #F8F9FA; /* Blanc cassé ergonomique */
            --surface: #ffffff;
            --text: #1A1A1B;
            --sub: #6C757D;
            --accent: #E63946; /* Rouge sport dynamique */
            --border: #DEE2E6;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 500px;
            padding: 30px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .logo { font-weight: 900; font-size: 1.2rem; letter-spacing: -1px; }
        .status { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--sub); }

        /* Timer Principal */
        .display-section {
            width: 100%;
            max-width: 500px;
            text-align: center;
            padding: 20px 0;
        }

        #time {
            font-size: 8.5rem;
            font-weight: 900;
            letter-spacing: -5px;
            line-height: 0.9;
            margin: 10px 0;
        }

        /* Stats Grid */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            max-width: 500px;
            border-top: 2px solid var(--border);
            border-bottom: 2px solid var(--border);
            background: var(--surface);
        }

        .stat-box { padding: 25px; text-align: center; border-right: 1px solid var(--border); }
        .stat-box:last-child { border-right: none; }
        .label { font-size: 0.65rem; font-weight: 800; color: var(--sub); text-transform: uppercase; display: block; margin-bottom: 5px; }
        .value { font-size: 1.6rem; font-weight: 800; }

        /* Configuration */
        .controls {
            width: 100%;
            max-width: 500px;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        .config-row { margin-bottom: 20px; }
        .config-label { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 700; margin-bottom: 8px; }
        
        input[type=range] { width: 100%; accent-color: var(--text); cursor: pointer; }
        input[type=text] { 
            width: 100%; border: none; background: transparent; 
            font-size: 1.2rem; font-weight: 700; border-bottom: 2px solid var(--border);
            padding: 5px 0; outline: none; transition: 0.3s;
        }
        input[type=text]:focus { border-color: var(--accent); }

        #mainBtn {
            width: 100%;
            padding: 30px;
            background: var(--text);
            color: white;
            border: none;
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.2s;
        }
        #mainBtn:active { transform: scale(0.98); background: var(--accent); }

        /* Historique */
        .history { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        .history-item { 
            background: var(--surface); padding: 15px; border-radius: 12px; 
            margin-bottom: 10px; border: 1px solid var(--border);
            display: grid; grid-template-columns: 2fr 1fr 1fr; align-items: center;
        }
        .h-name { font-weight: 800; font-size: 0.9rem; }
        .h-meta { font-size: 0.7rem; color: var(--sub); }
        .h-val { font-weight: 800; text-align: right; }
    </style>
</head>
<body>

    <header>
        <div class="logo">STARTGO<span style="color:var(--accent)">.</span></div>
        <div id="status" class="status">Prêt</div>
    </header>

    <div class="display-section">
        <input type="text" id="sessionName" value="Athlète 1" style="text-align: center; margin-bottom: 20px;">
        <div id="time">0.00</div>
    </div>

    <div class="stats">
        <div class="stat-box">
            <span class="label">Réaction</span>
            <span id="react">0.00<small>s</small></span>
        </div>
        <div class="stat-box">
            <span class="label">Vitesse</span>
            <span id="speed">0.0<small>km/h</small></span>
        </div>
    </div>

    <div class="controls">
        <div class="config-row">
            <div class="config-label"><span>Distance</span><span><b id="d-val">10</b> m</span></div>
            <input type="range" id="dist" min="5" max="100" value="10" oninput="document.getElementById('d-val').innerText=this.value">
        </div>
        <div class="config-row">
            <div class="config-label"><span>Attente fixe (sec)</span><span><b id="w-val">3</b> s</span></div>
            <input type="range" id="wait" min="1" max="10" value="3" oninput="document.getElementById('w-val').innerText=this.value">
        </div>
        <button id="mainBtn" onclick="prepareSession()">Lancer</button>
    </div>

    <div class="history" id="history">
        <div class="label" style="margin-bottom: 15px;">Dernières Sessions</div>
    </div>

    <script>
        let state = "IDLE", startTime, timer, reactionTime;
        const audio = new (window.AudioContext || window.webkitAudioContext)();

        // Chargement des cookies au démarrage
        window.onload = () => {
            const saved = document.cookie.split('; ').find(row => row.startsWith('history='));
            if (saved) {
                const data = JSON.parse(decodeURIComponent(saved.split('=')[1]));
                data.forEach(item => displayHistory(item));
            }
        };

        function beep(f, d) {
            const o = audio.createOscillator(), g = audio.createGain();
            o.connect(g); g.connect(audio.destination);
            o.frequency.value = f; o.start(); setTimeout(() => o.stop(), d);
        }

        function prepareSession() {
            state = "WAITING";
            document.getElementById('status').innerText = "Attention...";
            document.getElementById('mainBtn').disabled = true;
            
            const fixedWait = parseInt(document.getElementById('wait').value) * 1000;
            const randomWait = Math.random() * 20000; // Aléatoire entre 0 et 20s
            
            setTimeout(() => {
                if(state !== "WAITING") return;
                beep(880, 500); // Bip unique
                startTime = performance.now();
                state = "RUNNING";
                document.getElementById('status').innerText = "Partez !";
                timer = setInterval(() => {
                    const now = (performance.now() - startTime) / 1000;
                    document.getElementById('time').innerText = now.toFixed(2);
                    // Actualisation vitesse en temps réel (fictive tant qu'en course)
                    const dist = document.getElementById('dist').value;
                    document.getElementById('speed').innerText = ((dist/now)*3.6).toFixed(1);
                }, 40);
            }, fixedWait + randomWait);
        }

        // Simulation capteurs pour le test
        window.addEventListener('keydown', (e) => {
            if (state !== "RUNNING") return;
            if (e.code === "Space") triggerFinish();
            if (e.code === "KeyR") {
                reactionTime = (performance.now() - startTime) / 1000;
                document.getElementById('react').innerText = reactionTime.toFixed(2) + "s";
            }
        });

        // Fonctions pour les boutons de simulation à l'écran
        function triggerFoot() {
            if (state === "RUNNING") {
                reactionTime = (performance.now() - startTime) / 1000;
                document.getElementById('react').innerText = reactionTime.toFixed(2) + "s";
            }
        }

        function triggerFinish() {
            if (state === "RUNNING") {
                clearInterval(timer);
                state = "IDLE";
                const total = parseFloat(document.getElementById('time').innerText);
                const kmh = document.getElementById('speed').innerText;
                const name = document.getElementById('sessionName').value;
                const now = new Date();
                
                const session = {
                    name: name,
                    time: total,
                    speed: kmh,
                    date: now.toLocaleDateString(),
                    hour: now.getHours() + ":" + now.getMinutes()
                };
                
                saveToCookie(session);
                displayHistory(session);
                resetUI();
            }
        }

        function resetUI() {
            document.getElementById('status').innerText = "Terminé";
            document.getElementById('mainBtn').disabled = false;
        }

        function saveToCookie(session) {
            let history = [];
            const saved = document.cookie.split('; ').find(row => row.startsWith('history='));
            if (saved) history = JSON.parse(decodeURIComponent(saved.split('=')[1]));
            history.unshift(session);
            document.cookie = `history=${encodeURIComponent(JSON.stringify(history.slice(0, 10)))}; max-age=31536000; path=/`;
        }

        function displayHistory(s) {
            const h = document.getElementById('history');
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `
                <div><div class="h-name">${s.name}</div><div class="h-meta">${s.date} à ${s.hour}</div></div>
                <div class="h-val">${s.time}s</div>
                <div class="h-val" style="color:var(--accent)">${s.speed}</div>
            `;
            h.insertBefore(item, h.childNodes[2]);
        }
    </script>

    <div style="padding: 10px; display: flex; gap: 10px; opacity: 0.3;">
        <button onclick="triggerFoot()" style="font-size: 0.6rem; padding: 5px;">SIMU DÉCOLLAGE</button>
        <button onclick="triggerFinish()" style="font-size: 0.6rem; padding: 5px;">SIMU ARRIVÉE</button>
    </div>
</body>
</html>
