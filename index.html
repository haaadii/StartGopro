<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StartGo - Login</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #e2e8f0;
            --glass: rgba(255, 255, 255, 0.5);
            --text: #1e293b;
            --accent: #ff4757;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 100%);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; color: var(--text);
        }

        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.7);
            padding: 40px; border-radius: 40px; width: 90%; max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05); text-align: center;
        }

        h2 { font-weight: 900; letter-spacing: -1px; margin-bottom: 30px; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 0.7rem; font-weight: 800; color: #64748b; margin-left: 15px; text-transform: uppercase; }
        
        input, select {
            width: 100%; padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.8);
            background: rgba(255,255,255,0.4); margin-top: 5px; outline: none; box-sizing: border-box;
            font-family: inherit; font-weight: 600;
        }

        .role-selector {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0;
        }

        .role-option {
            padding: 15px; border-radius: 20px; border: 2px solid transparent;
            background: white; cursor: pointer; font-weight: 800; transition: 0.3s;
        }

        .role-option.active { border-color: var(--accent); color: var(--accent); }

        #mainBtn {
            width: 100%; padding: 18px; border-radius: 25px; border: none;
            background: var(--text); color: white; font-weight: 800; cursor: pointer;
            margin-top: 20px; transition: 0.3s;
        }

        .toggle-link { font-size: 0.8rem; margin-top: 20px; cursor: pointer; color: #64748b; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div id="auth-title"><h2>STARTGO<span style="color:var(--accent)">.</span></h2></div>
        
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="ton@email.com">
        </div>
        
        <div class="input-group">
            <label>Mot de passe</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <div id="signup-extras" style="display: none;">
            <div class="input-group">
                <label>Nom complet</label>
                <input type="text" id="fullname" placeholder="Jean Dupont">
            </div>
            <label>Je suis :</label>
            <div class="role-selector">
                <div class="role-option active" onclick="setRole('athlete')" id="opt-athlete">ATHLÈTE</div>
                <div class="role-option" onclick="setRole('coach')" id="opt-coach">COACH</div>
            </div>
        </div>

        <button id="mainBtn" onclick="handleAuth()">Se connecter</button>
        <div class="toggle-link" onclick="toggleMode()" id="toggle-text">Pas de compte ? Créer un profil</div>
    </div>

    <script>
        // CONFIGURATION FIREBASE
        const firebaseConfig = {
            apiKey: "XXXXX",
            authDomain: "XXXXX",
            projectId: "XXXXX",
            storageBucket: "XXXXX",
            messagingSenderId: "XXXXX",
            appId: "XXXXX"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let isSignup = false;
        let selectedRole = 'athlete';

        function setRole(role) {
            selectedRole = role;
            document.getElementById('opt-athlete').classList.toggle('active', role === 'athlete');
            document.getElementById('opt-coach').classList.toggle('active', role === 'coach');
        }

        function toggleMode() {
            isSignup = !isSignup;
            document.getElementById('signup-extras').style.display = isSignup ? 'block' : 'none';
            document.getElementById('mainBtn').innerText = isSignup ? 'Créer mon compte' : 'Se connecter';
            document.getElementById('toggle-text').innerText = isSignup ? 'Déjà un compte ? Se connecter' : 'Pas de compte ? Créer un profil';
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                if (isSignup) {
                    const name = document.getElementById('fullname').value;
                    const res = await auth.createUserWithEmailAndPassword(email, password);
                    // Sauvegarde du rôle dans la base de données
                    await db.collection('users').doc(res.user.uid).set({
                        name: name,
                        role: selectedRole,
                        email: email,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    alert("Compte créé !");
                } else {
                    await auth.signInWithEmailAndPassword(email, password);
                }
                // Une fois connecté, on redirigera vers le dashboard (prochaine étape)
                alert("Connecté !");
            } catch (error) {
                alert(error.message);
            }
        }
    </script>
</body>
</html>
