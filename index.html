<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StartGo Pro - FINAL NOTIFS</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --accent: #ff4757; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; margin: 0; color: var(--text); }
        .glass { background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; border: 1px solid white; box-shadow: 0 8px 32px rgba(0,0,0,0.05); }
        input, button, select { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 10px; font-family: inherit; box-sizing: border-box; }
        button { background: var(--text); color: white; font-weight: 800; cursor: pointer; border: none; transition: 0.2s; }
        .btn-accent { background: var(--accent); }
        
        #auth-section { display: flex; justify-content: center; align-items: center; height: 100vh; }
        #coach-view { display: none; height: 100vh; grid-template-columns: 280px 1fr; }
        #athlete-view { display: none; padding: 20px; max-width: 450px; margin: auto; }
        
        .sidebar { background: white; padding: 20px; border-right: 1px solid #e2e8f0; }
        .main { padding: 40px; overflow-y: auto; }
        .ath-item { background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; font-weight: 700; border: 1px solid #edf2f7; }
        
        /* STYLE NOTIFICATION */
        .toast { position: fixed; bottom: 20px; right: 20px; background: white; padding: 15px 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border-left: 6px solid var(--accent); font-weight: 800; z-index: 9999; animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { transform: translateX(150%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="auth-section">
        <div class="glass" style="width: 340px; text-align: center;">
            <h1>STARTGO<span style="color:var(--accent)">.</span></h1>
            <div id="signup-box" style="display:none;">
                <input type="text" id="name" placeholder="Prénom Nom">
                <select id="role"><option value="athlete">Athlète</option><option value="coach">Coach</option></select>
            </div>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Mot de passe">
            <button onclick="authAction()">VALIDER</button>
            <p onclick="document.getElementById('signup-box').style.display='block'; this.style.display='none'" style="font-size:0.8rem; cursor:pointer;">Nouveau ? Créer un compte</p>
        </div>
    </div>

    <div id="athlete-view">
        <div class="glass" id="link-panel" style="margin-bottom:20px;">
            <input type="text" id="inv-code" placeholder="CODE COACH" style="text-align:center;">
            <button class="btn-accent" onclick="linkToCoach()">ACTIVER LA LIAISON</button>
        </div>
        <div class="glass" style="text-align:center; padding:40px 0;">
            <div id="timer" style="font-size:6rem; font-weight:900;">0.00</div>
        </div>
        <button onclick="startRun()" id="goBtn" style="margin-top:20px; padding:25px;">DÉMARRER</button>
        <button onclick="forceFinish()" style="background:#e2e8f0; color:#475569; margin-top:10px;">SIMULER CAPTEUR</button>
    </div>

    <div id="coach-view">
        <div class="sidebar">
            <h2>STARTGO<span style="color:var(--accent)">.</span></h2>
            <div id="list-container"></div>
            <button onclick="auth.signOut().then(()=>location.reload())" style="margin-top:auto;">Quitter</button>
        </div>
        <div class="main">
            <div class="glass" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h1 style="margin:0;">Coach Panel</h1>
                <button onclick="genPairCode()" class="btn-accent" style="width:auto;">Générer Code</button>
            </div>
            <div id="code-box" style="display:none; text-align:center; margin-bottom:20px; font-size:1.5rem; font-weight:900;"></div>
            
            <div id="stats-panel" class="glass" style="display:none;">
                <h2 id="active-name">Stats</h2>
                <div style="height:280px;"><canvas id="perfChart"></canvas></div>
                <div id="history-box" style="margin-top:20px;"></div>
            </div>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyDKvUUqhl9xIBFVuBDT35rbjkFxBxWX5ZU",
            authDomain: "startgo-project.firebaseapp.com",
            projectId: "startgo-project",
            storageBucket: "startgo-project.firebasestorage.app",
            messagingSenderId: "920233789220",
            appId: "1:920233789220:web:9f8a8d9fd3a3add39a55b1"
        };
        firebase.initializeApp(config);
        const auth = firebase.auth(), db = firebase.firestore();
        let myChart = null, runTimer, startTime;

        async function authAction() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            const isReg = document.getElementById('signup-box').style.display === 'block';
            try {
                if(isReg) {
                    const r = await auth.createUserWithEmailAndPassword(e, p);
                    await db.collection('users').doc(r.user.uid).set({ uid: r.user.uid, name: document.getElementById('name').value, role: document.getElementById('role').value, email: e });
                } else await auth.signInWithEmailAndPassword(e, p);
            } catch(err) { alert(err.message); }
        }

        auth.onAuthStateChanged(async u => {
            if(!u) return;
            document.getElementById('auth-section').style.display = 'none';
            const data = (await db.collection('users').doc(u.uid).get()).data();
            if(data.role === 'coach') {
                document.getElementById('coach-view').style.display = 'grid';
                initCoach(u.uid);
            } else {
                document.getElementById('athlete-view').style.display = 'block';
                if(data.coachId) document.getElementById('link-panel').style.display = 'none';
            }
        });

        // NOTIFICATIONS
        function notify(msg) {
            const t = document.createElement('div');
            t.className = "toast";
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity="0"; setTimeout(()=>t.remove(), 500); }, 4000);
        }

        // COACH LOGIC
        function initCoach(id) {
            db.collection('users').where('coachId', '==', id).onSnapshot(s => {
                const list = document.getElementById('list-container');
                list.innerHTML = "";
                s.forEach(doc => {
                    const d = document.createElement('div');
                    d.className = "ath-item"; d.innerText = doc.data().name;
                    d.onclick = () => loadStats(doc.data());
                    list.appendChild(d);
                });
            });

            // Écoute des nouveaux temps pour notifications
            db.collection('sessions').where('coachId', '==', id).where('date', '>', new Date()).onSnapshot(s => {
                s.docChanges().forEach(c => {
                    if(c.type === "added") notify(`Nouveau temps : ${c.doc.data().time}s par ${c.doc.data().athleteName}`);
                });
            });
        }

        async function genPairCode() {
            const c = Math.random().toString(36).substring(2,6).toUpperCase();
            await db.collection('pairing_codes').doc(c).set({ coachId: auth.currentUser.uid });
            document.getElementById('code-box').innerText = "CODE : " + c;
            document.getElementById('code-box').style.display = 'block';
        }

        function loadStats(a) {
            document.getElementById('stats-panel').style.display = 'block';
            document.getElementById('active-name').innerText = a.name;
            db.collection('sessions').where('athleteId', '==', a.uid).onSnapshot(s => {
                let data = [];
                s.forEach(doc => data.push(doc.data()));
                data.sort((x, y) => x.date.seconds - y.date.seconds);
                const labels = [], values = [];
                const hBox = document.getElementById('history-box');
                hBox.innerHTML = "";
                data.forEach(item => {
                    const dStr = item.date.toDate().toLocaleDateString();
                    labels.push(dStr); values.push(parseFloat(item.time));
                    hBox.insertAdjacentHTML('afterbegin', `<div style="background:white; padding:10px; border-radius:10px; margin-bottom:5px; display:flex; justify-content:space-between;"><b>${item.time}s</b> <span>${dStr}</span></div>`);
                });
                if(myChart) myChart.destroy();
                myChart = new Chart(document.getElementById('perfChart'), {
                    type: 'line',
                    data: { labels: labels, datasets: [{ label: 'Secondes', data: values, borderColor: '#ff4757', tension: 0.3, fill: true, backgroundColor: 'rgba(255,71,87,0.1)' }] },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { reverse: true } } }
                });
            });
        }

        // ATHLETE LOGIC
        async function linkToCoach() {
            const code = document.getElementById('inv-code').value.toUpperCase();
            const snap = await db.collection('pairing_codes').doc(code).get();
            if(snap.exists) {
                await db.collection('users').doc(auth.currentUser.uid).update({ coachId: snap.data().coachId });
                location.reload();
            } else alert("Code erroné");
        }

        function startRun() {
            document.getElementById('goBtn').innerText = "PRÊT...";
            setTimeout(() => {
                startTime = performance.now();
                document.getElementById('goBtn').innerText = "RUN !";
                runTimer = setInterval(() => {
                    document.getElementById('timer').innerText = ((performance.now() - startTime) / 1000).toFixed(2);
                }, 40);
            }, 3000);
        }

        async function forceFinish() {
            clearInterval(runTimer);
            const u = auth.currentUser;
            const profile = (await db.collection('users').doc(u.uid).get()).data();
            if(!profile.coachId) return alert("Pas de coach lié !");
            await db.collection('sessions').add({
                athleteId: u.uid, athleteName: profile.name, coachId: profile.coachId,
                time: document.getElementById('timer').innerText, date: firebase.firestore.Timestamp.now()
            });
            alert("Envoyé !");
            document.getElementById('goBtn').innerText = "DÉMARRER";
        }
    </script>
</body>
</html>
